<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Bon Odori 2026 · ตารางกิจกรรม</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;600;700;800&family=Sarabun:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: #0c0c26; }
  .booth-tag { transition: transform .15s ease, box-shadow .15s ease; }
  .booth-tag:hover { transform: translateY(-2px); }
  .member-pill { transition: all .18s ease; }
  .stub { position: relative; }
  .stub::before, .stub::after {
    content: "";
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    width: 18px;
    height: 18px;
    background: #14143a;
    border-radius: 50%;
  }
  .stub::before { left: -9px; }
  .stub::after { right: -9px; }
  .grid-table { border-collapse: separate; border-spacing: 0 8px; width: 100%; min-width: 620px; }
  .grid-cell { transition: transform .12s ease; }
  .grid-cell:hover { transform: scale(1.05); }
  .scroll-wrap::-webkit-scrollbar { height: 8px; }
  .scroll-wrap::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 8px; }
</style>
</head>
<body>
<div id="root"></div>

<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>

<script>
const h = React.createElement;
const useState = React.useState;
const useMemo = React.useMemo;

/* ---------------------------------------------------
   DATA
--------------------------------------------------- */

const BOOTHS = {
  merch:    { name: "Official Merchandise",   short: "Merch",     th: "สินค้าที่ระลึก",   emoji: "🎽" },
  stage:    { name: "Bon Odori Center Stage", short: "Stage",     th: "เวทีกลาง",         emoji: "🎏" },
  hachicha: { name: "Hachi Cha",              short: "Hachi Cha", th: "ชงชา",             emoji: "🍵" },
  roulette: { name: "Lucky Roulette",         short: "Roulette",  th: "รูเล็ตนำโชค",      emoji: "🎡" },
  shateki:  { name: "Cork Shateki",           short: "Shateki",   th: "ยิงเป้าจุก",       emoji: "🔫" },
  plinko:   { name: "Plinko",                 short: "Plinko",    th: "พลิงโกะ",          emoji: "🔺" },
  omikuji:  { name: "Omikuji Suuji Battle",   short: "Omikuji",   th: "จับฉลากเลขเด็ด",   emoji: "🎋" },
  wanage:   { name: "Wanage",                 short: "Wanage",    th: "ห่วงยาง",          emoji: "⭕" },
};

const DAY_META = {
  FRI: { label: "FRI 24", full: "ศุกร์ 24 ก.ค.", color: "#3FB6E8" },
  SAT: { label: "SAT 25", full: "เสาร์ 25 ก.ค.", color: "#A66BD1" },
  SUN: { label: "SUN 26", full: "อาทิตย์ 26 ก.ค.", color: "#E85A4F" },
};

const MEMBERS = {
  Rose: {
    color: "#F4D035",
    schedule: [
      { day: "SAT", time: "11:00–12:00", booth: "roulette", withList: ["Sindy", "Khaimook"] },
      { day: "SAT", time: "13:00–14:00", booth: "shateki",  withList: ["Emma", "Punpon"] },
      { day: "SAT", time: "14:00–15:00", booth: "omikuji",  withList: ["Nana", "Mayji"] },
      { day: "SAT", time: "15:00–16:00", booth: "stage",    withList: ["Lingling", "Valentine", "Mint", "Tara", "Ploen", "Emma"] },
      { day: "SAT", time: "18:00–19:00", booth: "wanage",   withList: ["Kwan", "Hongyok"] },
      { day: "SUN", time: "11:00–12:00", booth: "shateki",  withList: ["Arlee", "Grape"] },
      { day: "SUN", time: "14:00–15:00", booth: "hachicha", withList: ["Tara", "Emmy"] },
      { day: "SUN", time: "15:00–16:00", booth: "plinko",   withList: ["Monet", "Emma"] },
    ],
  },
  Inkcha: {
    color: "#7FD858",
    schedule: [
      { day: "SAT", time: "11:00–12:00", booth: "hachicha", withList: ["Neen", "Mint"] },
      { day: "SAT", time: "12:00–13:00", booth: "shateki",  withList: ["Nammonn", "Nisha"] },
      { day: "SAT", time: "13:00–14:00", booth: "plinko",   withList: ["Else", "Praew"] },
      { day: "SAT", time: "15:00–16:00", booth: "wanage",   withList: ["Sindy", "Namphet"] },
      { day: "SAT", time: "16:00–17:00", booth: "omikuji",  withList: ["Pancake", "Arlee"] },
      { day: "SUN", time: "12:00–13:00", booth: "roulette", withList: ["Patt", "Proud"] },
      { day: "SUN", time: "13:00–14:00", booth: "hachicha", withList: ["Patt", "Emma"] },
      { day: "SUN", time: "14:00–15:00", booth: "merch",    withList: ["Neen", "Mail"] },
      { day: "SUN", time: "16:00–17:00", booth: "stage",    withList: ["Neen", "Hongyok", "Proud", "Palmmy", "Khowjow", "Luksorn"] },
    ],
  },
  Marine: {
    color: "#3FB6E8",
    schedule: [
      { day: "FRI", time: "11:00–12:00", booth: "roulette", withList: ["Chifa", "Tara"] },
      { day: "FRI", time: "14:00–15:00", booth: "shateki",  withList: ["Yoghurt", "Praifa"] },
      { day: "FRI", time: "17:00–18:00", booth: "omikuji",  withList: ["Prae", "Nisha"] },
      { day: "SAT", time: "11:00–12:00", booth: "wanage",   withList: ["Khowjow", "Proud"] },
      { day: "SAT", time: "14:00–15:00", booth: "plinko",   withList: ["Kwan", "Khaimook"] },
      { day: "SAT", time: "17:00–18:00", booth: "hachicha", withList: ["Lingling", "Proud"] },
      { day: "SUN", time: "12:00–13:00", booth: "omikuji",  withList: ["Kwan", "Blythe"] },
      { day: "SUN", time: "14:00–15:00", booth: "stage",    withList: ["Blythe", "Jingjing", "Saonoi", "Mirin", "Praew"] },
      { day: "SUN", time: "16:00–17:00", booth: "wanage",   withList: ["Lookked", "Arlee"] },
    ],
  },
  Sindy: {
    color: "#E85A4F",
    schedule: [
      { day: "FRI", time: "12:00–13:00", booth: "shateki",  withList: ["Namphet", "Saonoi"] },
      { day: "FRI", time: "13:00–14:00", booth: "stage",    withList: ["Hoop", "Punpon", "Fame", "Berry"] },
      { day: "FRI", time: "15:00–16:00", booth: "omikuji",  withList: ["Ploen", "Khaimook"] },
      { day: "FRI", time: "17:00–18:00", booth: "hachicha", withList: ["Ploen", "Khaimook"] },
      { day: "SAT", time: "11:00–12:00", booth: "roulette", withList: ["Rose", "Khaimook"] },
      { day: "SAT", time: "15:00–16:00", booth: "wanage",   withList: ["Namphet", "Inkcha"] },
      { day: "SAT", time: "17:00–18:00", booth: "plinko",   withList: ["Jingjing", "Luksorn"] },
      { day: "SUN", time: "12:00–13:00", booth: "merch",    withList: ["Hongyok", "Jew"] },
      { day: "SUN", time: "14:00–15:00", booth: "shateki",  withList: ["Nana", "Cartoon"] },
    ],
  },
  Praew: {
    color: "#C97CE0",
    schedule: [
      { day: "FRI", time: "11:00–12:00", booth: "shateki",  withList: ["Pancake", "L"] },
      { day: "FRI", time: "13:00–14:00", booth: "roulette", withList: ["Lewlew", "Mail"] },
      { day: "FRI", time: "16:00–17:00", booth: "omikuji",  withList: ["Valentine", "Lewlew"] },
      { day: "FRI", time: "17:00–18:00", booth: "merch",    withList: ["Wawa", "Mayji"] },
      { day: "FRI", time: "19:00–20:00", booth: "wanage",   withList: ["Khaimook", "Tara"] },
      { day: "SAT", time: "13:00–14:00", booth: "plinko",   withList: ["Inkcha", "Else"] },
      { day: "SAT", time: "15:00–16:00", booth: "hachicha", withList: ["Mirin", "Else"] },
      { day: "SAT", time: "17:00–18:00", booth: "roulette", withList: ["Palmmy", "Ploen"] },
      { day: "SAT", time: "18:00–19:00", booth: "shateki",  withList: ["Mirin", "Valentine"] },
      { day: "SUN", time: "11:00–12:00", booth: "roulette", withList: ["Nana", "Prae"] },
      { day: "SUN", time: "14:00–15:00", booth: "stage",    withList: ["Marine", "Blythe", "Jingjing", "Saonoi", "Mirin"] },
    ],
  },
};

const MEMBER_NAMES = Object.keys(MEMBERS);
const DAY_ORDER = ["FRI", "SAT", "SUN"];

function buildCombinedGrid() {
  const grid = {};
  DAY_ORDER.forEach((day) => {
    const timesSet = new Set();
    MEMBER_NAMES.forEach((name) => {
      MEMBERS[name].schedule.forEach((s) => {
        if (s.day === day) timesSet.add(s.time);
      });
    });
    const times = Array.from(timesSet).sort((a, b) => parseInt(a) - parseInt(b));
    const rows = times.map((time) => {
      const cells = {};
      MEMBER_NAMES.forEach((name) => {
        const entry = MEMBERS[name].schedule.find((s) => s.day === day && s.time === time);
        cells[name] = entry ? entry.booth : null;
      });
      return { time: time, cells: cells };
    });
    grid[day] = rows;
  });
  return grid;
}

/* ---------------------------------------------------
   COMPONENT (plain React.createElement, no JSX/Babel)
--------------------------------------------------- */

function BonOdoriSchedule() {
  const [active, setActive] = useState("Rose");
  const combinedGrid = useMemo(buildCombinedGrid, []);
  const isCombined = active === "ALL";
  const member = isCombined ? null : MEMBERS[active];

  const grouped = !isCombined
    ? DAY_ORDER
        .map((d) => ({ day: d, items: member.schedule.filter((s) => s.day === d) }))
        .filter((g) => g.items.length > 0)
    : [];

  const memberPills = MEMBER_NAMES.map((name) => {
    const isActive = active === name;
    const c = MEMBERS[name].color;
    return h("button", {
      key: name,
      className: "member-pill",
      onClick: () => setActive(name),
      style: {
        border: "1.5px solid " + (isActive ? c : "rgba(255,255,255,0.18)"),
        background: isActive ? c : "rgba(255,255,255,0.04)",
        color: isActive ? "#14143a" : "#F4F0FF",
        fontFamily: "'Kanit', sans-serif",
        fontWeight: 700,
        fontSize: 15,
        padding: "9px 20px",
        borderRadius: 999,
        cursor: "pointer",
        boxShadow: isActive ? ("0 6px 20px " + c + "55") : "none",
      }
    }, name);
  });

  const combinedPill = h("button", {
    className: "member-pill",
    onClick: () => setActive("ALL"),
    style: {
      display: "flex",
      alignItems: "center",
      gap: 7,
      border: "1.5px solid " + (isCombined ? "#F4D035" : "rgba(255,255,255,0.18)"),
      background: isCombined ? "#F4D035" : "rgba(255,255,255,0.04)",
      color: isCombined ? "#14143a" : "#F4F0FF",
      fontFamily: "'Kanit', sans-serif",
      fontWeight: 700,
      fontSize: 15,
      padding: "9px 20px",
      borderRadius: 999,
      cursor: "pointer",
      boxShadow: isCombined ? "0 6px 20px #F4D03555" : "none",
    }
  }, h("span", null, "▦"), "ตารางรวม 5 คน");

  let mainSection;

  if (!isCombined) {
    mainSection = h("div", { style: { maxWidth: 640, margin: "0 auto", padding: "0 20px" } },
      h("div", { style: { display: "flex", alignItems: "center", gap: 8, marginBottom: 18, color: member.color } },
        h("span", { style: { fontSize: 18 } }, "🎟️"),
        h("span", { style: { fontWeight: 700, fontSize: 15 } }, active + " · ทั้งหมด " + member.schedule.length + " รอบ")
      ),
      grouped.map((g) => h("div", { key: g.day, style: { marginBottom: 28 } },
        h("div", {
          style: {
            display: "inline-flex", alignItems: "center", gap: 8,
            background: DAY_META[g.day].color, color: "#0c0c26", fontWeight: 800, fontSize: 13,
            padding: "5px 14px", borderRadius: 8, marginBottom: 14, letterSpacing: 0.5,
          }
        },
          DAY_META[g.day].label,
          h("span", { style: { fontWeight: 500, opacity: 0.75 } }, DAY_META[g.day].full)
        ),
        h("div", { style: { display: "flex", flexDirection: "column", gap: 10 } },
          g.items.map((item, i) => {
            const b = BOOTHS[item.booth];
            return h("div", {
              key: i,
              className: "booth-tag stub",
              style: {
                background: "rgba(255,255,255,0.045)",
                border: "1px dashed rgba(255,255,255,0.22)",
                borderRadius: 14,
                padding: "14px 20px",
                display: "flex",
                alignItems: "center",
                gap: 16,
              }
            },
              h("div", { style: { fontSize: 26, width: 42, textAlign: "center", flexShrink: 0 } }, b.emoji),
              h("div", { style: { flex: 1, minWidth: 0 } },
                h("div", { style: { fontWeight: 700, fontSize: 15.5, color: "#FFFFFF" } }, b.name),
                h("div", { style: { display: "flex", alignItems: "center", gap: 5, marginTop: 6, fontSize: 12.5, color: "#C7C2EE" } },
                  h("span", { style: { fontSize: 12 } }, "👥"),
                  h("span", null, item.withList.join(", "))
                )
              ),
              h("div", { style: { display: "flex", alignItems: "center", gap: 5, fontWeight: 700, fontSize: 14, color: member.color, flexShrink: 0, whiteSpace: "nowrap" } },
                h("span", { style: { fontSize: 13 } }, "⏰"),
                item.time
              )
            );
          })
        )
      ))
    );
  } else {
    const dayBlocks = DAY_ORDER.map((day) => {
      const headerRow = h("tr", null,
        h("th", { style: { textAlign: "left", fontSize: 12.5, color: "#9C97C9", fontWeight: 600, padding: "0 10px", width: 90 } }, "เวลา"),
        MEMBER_NAMES.map((name) => h("th", {
          key: name,
          style: { fontSize: 13.5, fontWeight: 800, color: MEMBERS[name].color, padding: "0 6px 6px", textAlign: "center" }
        }, name))
      );

      const bodyRows = combinedGrid[day].map((row) => {
        const cells = MEMBER_NAMES.map((name) => {
          const boothKey = row.cells[name];
          const b = boothKey ? BOOTHS[boothKey] : null;
          return h("td", { key: name, style: { padding: "0 4px" } },
            h("div", {
              className: "grid-cell",
              style: {
                background: b ? "rgba(255,255,255,0.06)" : "transparent",
                border: b ? ("1px solid " + MEMBERS[name].color + "55") : "1px dashed rgba(255,255,255,0.08)",
                borderRadius: 10,
                minHeight: 52,
                display: "flex",
                flexDirection: "column",
                alignItems: "center",
                justifyContent: "center",
                padding: "6px 2px",
                textAlign: "center",
              }
            },
              b
                ? [
                    h("span", { key: "e", style: { fontSize: 18, lineHeight: 1 } }, b.emoji),
                    h("span", { key: "t", style: { fontSize: 10, color: "#C7C2EE", marginTop: 3, lineHeight: 1.1 } }, b.short),
                  ]
                : h("span", { style: { fontSize: 12, color: "#4A4670" } }, "–")
            )
          );
        });
        return h("tr", { key: row.time },
          h("td", { style: { fontSize: 12.5, fontWeight: 700, color: "#E8E4FF", padding: "0 10px", whiteSpace: "nowrap" } }, row.time),
          cells
        );
      });

      return h("div", { key: day, style: { marginBottom: 32 } },
        h("div", {
          style: {
            display: "inline-flex", alignItems: "center", gap: 8,
            background: DAY_META[day].color, color: "#0c0c26", fontWeight: 800, fontSize: 13,
            padding: "5px 14px", borderRadius: 8, marginBottom: 14, letterSpacing: 0.5,
          }
        },
          DAY_META[day].label,
          h("span", { style: { fontWeight: 500, opacity: 0.75 } }, DAY_META[day].full)
        ),
        h("div", { className: "scroll-wrap", style: { overflowX: "auto", paddingBottom: 4 } },
          h("table", { className: "grid-table" },
            h("thead", null, headerRow),
            h("tbody", null, bodyRows)
          )
        )
      );
    });

    const legend = h("div", {
      style: {
        display: "flex", flexWrap: "wrap", gap: "8px 18px", justifyContent: "center",
        marginTop: 8, padding: "16px 12px", background: "rgba(255,255,255,0.03)", borderRadius: 14,
      }
    },
      Object.values(BOOTHS).map((b) => h("div", {
        key: b.name,
        style: { display: "flex", alignItems: "center", gap: 6, fontSize: 12.5, color: "#B9B4E0" }
      },
        h("span", { style: { fontSize: 15 } }, b.emoji),
        h("span", null, b.name)
      ))
    );

    mainSection = h("div", { style: { maxWidth: 900, margin: "0 auto", padding: "0 20px" } }, dayBlocks, legend);
  }

  return h("div", {
    style: {
      minHeight: "100vh",
      width: "100%",
      background: "radial-gradient(circle at 15% 0%, #23234f 0%, #14143a 45%, #0c0c26 100%)",
      fontFamily: "'Kanit', 'Sarabun', sans-serif",
      color: "#F4F0FF",
      padding: "0 0 64px 0",
    }
  },
    h("div", { style: { padding: "40px 20px 24px", textAlign: "center", position: "relative" } },
      h("div", { style: { fontSize: 13, letterSpacing: 4, color: "#F4D035", fontWeight: 600, marginBottom: 8 } },
        "盆踊り BON ODORI 2026 · 24–26 JULY · ISLAND HALL 3FL, FASHION ISLAND"),
      h("h1", { style: { fontSize: "clamp(28px, 5vw, 44px)", fontWeight: 800, margin: 0, lineHeight: 1.15, textShadow: "0 4px 24px rgba(244,208,53,0.25)" } },
        "ตารางกิจกรรม"),
      h("p", { style: { color: "#B9B4E0", fontSize: 15, marginTop: 10, maxWidth: 520, marginInline: "auto" } },
        "รวมทุกรอบของ Rose · Inkcha · Marine · Sindy · Praew จากทั้ง 8 บูธกิจกรรมตลอด 3 วัน")
    ),

    h("div", { style: { display: "flex", gap: 10, justifyContent: "center", flexWrap: "wrap", padding: "8px 20px 32px", alignItems: "center" } },
      memberPills,
      h("div", { style: { width: 1, height: 24, background: "rgba(255,255,255,0.18)", margin: "0 4px" } }),
      combinedPill
    ),

    mainSection,

    h("p", { style: { textAlign: "center", color: "#6E699C", fontSize: 12, marginTop: 20 } },
      "* เวลาและรายชื่ออาจมีการเปลี่ยนแปลงตามประกาศหน้างาน — ตรวจสอบจากป้ายจริงอีกครั้ง")
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(h(BonOdoriSchedule));
</script>
</body>
</html>
